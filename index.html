<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE NUMBER: WARFARE -FINAL-</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --pink: #ff007c; --blue: #00e5ff; --yellow: #fff000; }
        body { 
            margin: 0; background: #000; color: white; font-family: 'Arial', sans-serif; 
            overflow-x: hidden; touch-action: manipulation; user-select: none;
        }
        #game-container { display: flex; flex-direction: column; align-items: center; padding-bottom: 50px; }

        /* 固定ヘッダー */
        #header { position: sticky; top: 0; background: rgba(0,0,0,0.95); width: 100%; padding: 15px 0; z-index: 100; border-bottom: 3px solid var(--pink); text-align: center; }
        #score-val { font-size: 2.8rem; color: var(--yellow); font-weight: 900; text-shadow: 0 0 10px var(--yellow); }
        #mps-val { font-size: 1rem; color: var(--blue); margin-top: 5px; }

        /* 巨大タップボタン */
        #core-btn {
            width: 200px; height: 200px; border-radius: 50%; background: #111;
            border: 8px solid var(--pink); color: var(--pink); font-size: 2rem; font-weight: bold;
            box-shadow: 0 0 30px var(--pink); margin: 30px 0; outline: none; cursor: pointer;
            transition: transform 0.05s; -webkit-tap-highlight-color: transparent;
        }
        #core-btn:active { transform: scale(0.92); filter: brightness(1.3); }

        /* ランキング */
        #leaderboard { width: 90%; max-width: 500px; background: #111; border: 1px solid var(--blue); border-radius: 15px; padding: 15px; margin-bottom: 30px; box-sizing: border-box; }
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #222; font-family: monospace; }
        .rank-item.is-me { background: rgba(255,240,0,0.15); color: var(--yellow); border-radius: 5px; }
        .attack-btn { background: var(--pink); border: none; color: white; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }

        /* ショップエリア：押しやすく大きなボタン */
        #shop-title { color: var(--blue); font-weight: bold; margin-bottom: 10px; width: 90%; max-width: 500px; }
        #shop { width: 90%; max-width: 500px; display: grid; grid-template-columns: 1fr; gap: 12px; }
        .shop-item { 
            background: #1a1a1a; border: 2px solid #444; padding: 15px; border-radius: 12px; 
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .shop-item.can-buy { border-color: var(--blue); background: #222; box-shadow: 0 0 10px rgba(0,229,255,0.2); }
        .shop-item.disabled { opacity: 0.4; cursor: not-allowed; }
        .item-info { text-align: left; }
        .item-name { font-size: 1.1rem; font-weight: bold; color: var(--blue); display: block; }
        .item-cost { font-size: 0.9rem; color: var(--yellow); }
        .item-count { font-size: 1.5rem; font-weight: bold; opacity: 0.7; }
    </style>
</head>
<body>

<div id="game-container">
    <div id="header">
        <div id="score-val">0</div>
        <div id="mps-val">GENERATION: 0 /s</div>
    </div>

    <button id="core-btn">TAP!!</button>

    <div id="leaderboard">
        <div style="font-size: 0.9rem; color: var(--blue); margin-bottom: 10px;">GLOBAL TARGETS (Top 10)</div>
        <div id="rank-list">Connecting to Network...</div>
    </div>

    <div id="shop-title">UPGRADES</div>
    <div id="shop"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAYnC_bHIPYElG8zjbL-7vEIH4rWSA7hbw",
        authDomain: "my-warfare-game-fa3db.firebaseapp.com",
        databaseURL: "https://my-warfare-game-fa3db-default-rtdb.firebaseio.com",
        projectId: "my-warfare-game-fa3db",
        storageBucket: "my-warfare-game-fa3db.firebasestorage.app",
        messagingSenderId: "408551026184",
        appId: "1:408551026184:web:85e80b61c8110ce3d6abbd"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 1. アカウントの永続化
    let myId = localStorage.getItem('warfare_final_v3_id');
    if (!myId) {
        myId = "USER-" + Math.random().toString(36).substring(2, 7).toUpperCase();
        localStorage.setItem('warfare_final_v3_id', myId);
    }

    // 2. 施設データ (10種類)
    const shopData = [
        { name: "Micro Chip", base: 15, p: 0.2 },
        { name: "Logic Gate", base: 100, p: 1 },
        { name: "Data Siphon", base: 500, p: 6 },
        { name: "Cyber Rig", base: 3000, p: 25 },
        { name: "Mainframe", base: 12000, p: 90 },
        { name: "Cloud Array", base: 60000, p: 450 },
        { name: "Neural Net", base: 300000, p: 2100 },
        { name: "AI Core", base: 1500000, p: 9500 },
        { name: "Dyson Web", base: 10000000, p: 60000 },
        { name: "Omega Point", base: 100000000, p: 400000 }
    ];

    let score = 0;
    let counts = Array(shopData.length).fill(0);
    let mps = 0;

    // 3. データ読み込み (最初の一回だけ)
    db.ref('users/' + myId).once('value', (snap) => {
        const d = snap.val();
        if (d) {
            score = d.score || 0;
            if (d.counts) counts = d.counts;
        }
        updateMPS();
        renderShop();
    });

    function updateMPS() {
        mps = counts.reduce((acc, c, i) => acc + (c * shopData[i].p), 0);
        document.getElementById('mps-val').innerText = `GENERATION: ${mps.toFixed(1)} /s`;
    }

    function save() {
        db.ref('users/' + myId).set({
            score: Math.floor(score),
            counts: counts,
            mps: Number(mps.toFixed(1))
        });
    }

    // タップ
    document.getElementById('core-btn').addEventListener('touchstart', (e) => {
        e.preventDefault();
        score += 1 + Math.floor(mps * 0.05); // MPSの5%もタップに追加
        updateUI();
    });
    // PC用
    document.getElementById('core-btn').addEventListener('mousedown', () => {
        score += 1 + Math.floor(mps * 0.05);
        updateUI();
    });

    function buy(i) {
        const cost = Math.floor(shopData[i].base * Math.pow(1.15, counts[i]));
        if (score >= cost) {
            score -= cost;
            counts[i]++;
            updateMPS();
            renderShop();
            updateUI();
            save(); // 購入時に即セーブ
        }
    }

    function attack(targetId) {
        if (score < 100) return alert("Energy too low! (Need 100)");
        let damage = Math.floor(score * 0.1) * 5; 
        score -= Math.floor(score * 0.1);
        
        db.ref('users/' + targetId + '/score').transaction(s => Math.max(0, (s || 0) - damage));
        save();
        alert(`ATTACK SUCCESS: -${damage} to ${targetId}`);
    }

    function renderShop() {
        const container = document.getElementById('shop');
        container.innerHTML = shopData.map((item, i) => {
            const cost = Math.floor(item.base * Math.pow(1.15, counts[i]));
            const canBuy = score >= cost;
            return `
                <div class="shop-item ${canBuy ? 'can-buy' : 'disabled'}" onclick="buy(${i})">
                    <div class="item-info">
                        <span class="item-name">${item.name}</span>
                        <span class="item-cost">Cost: ${cost.toLocaleString()}</span>
                    </div>
                    <div class="item-count">${counts[i]}</div>
                </div>
            `;
        }).join('');
    }

    function updateUI() {
        document.getElementById('score-val').innerText = Math.floor(score).toLocaleString();
    }

    // 定期処理
    setInterval(() => {
        score += (mps / 10);
        updateUI();
        // 買えるようになったか見た目だけ更新
        const items = document.querySelectorAll('.shop-item');
        shopData.forEach((item, i) => {
            const cost = Math.floor(item.base * Math.pow(1.15, counts[i]));
            if (score >= cost) items[i].classList.add('can-buy');
            else items[i].classList.remove('can-buy');
        });
    }, 100);

    // 10秒に一回自動セーブ
    setInterval(save, 10000);

    // ランキング監視
    db.ref('users').orderByChild('score').limitToLast(10).on('value', (snap) => {
        const list = document.getElementById('rank-list');
        list.innerHTML = "";
        let players = [];
        snap.forEach(c => players.unshift({ id: c.key, ...c.val() }));

        players.forEach((p, idx) => {
            if (p.id === myId) score = p.score; // 攻撃された結果を同期
            const div = document.createElement('div');
            div.className = `rank-item ${p.id === myId ? 'is-me' : ''}`;
            div.innerHTML = `
                <span>#${idx+1} ${p.id.substring(0,8)}: ${Math.floor(p.score).toLocaleString()}</span>
                ${p.id !== myId ? `<button class="attack-btn" onclick="attack('${p.id}')">STEAL</button>` : ' (YOU)'}
            `;
            list.appendChild(div);
        });
    });
</script>
</body>
</html>
