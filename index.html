<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE NUMBER: WARFARE -DEBUG-</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #f8faff; --card: #ffffff; --text: #2c2c2e; --sub: #8e8e93; 
            --accent: #007aff; --attack: #ff3b30; --score: #5856d6; --border: #e0e0e0;
        }
        [data-theme='dark'] {
            --bg: #0a0a0a; --card: #1c1c1e; --text: #ffffff; --sub: #aaa; 
            --accent: #0a84ff; --attack: #ff453a; --score: #bf5af2; --border: #333;
        }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; transition: 0.3s; overflow: hidden; touch-action: manipulation; }
        #header { position: fixed; top: 0; width: 100%; height: 100px; background: var(--card); border-bottom: 1px solid var(--border); z-index: 100; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #score-val { font-size: 2.2rem; color: var(--score); font-weight: 800; }
        .top-btn { position: fixed; top: 20px; z-index: 110; border: none; padding: 10px 15px; border-radius: 20px; cursor: pointer; color: white; }
        #rank-toggle { right: 80px; background: var(--accent); }
        #theme-toggle { right: 15px; background: #555; }
        #user-info { position: fixed; top: 15px; left: 15px; z-index: 110; background: var(--card); padding: 8px; border-radius: 10px; border: 1px solid var(--border); font-size: 0.7rem; }
        #main-game { height: 100vh; display: flex; align-items: center; justify-content: center; }
        #core-btn { width: 180px; height: 180px; border-radius: 50%; background: var(--card); border: 8px solid var(--accent); color: var(--accent); font-size: 1.5rem; font-weight: 900; cursor: pointer; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .modal { position: fixed; top: 100px; bottom: 0; left: 0; right: 0; background: var(--bg); z-index: 90; display: none; overflow-y: auto; padding: 20px; padding-bottom: 120px; }
        .modal.active { display: block; }
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .card.is-me { border: 2px solid #ffcc00; background: rgba(255, 204, 0, 0.1); }
        .attack-btn { background: var(--attack); color: white; border: none; padding: 8px; border-radius: 8px; font-weight: bold; }
        #shop-toggle { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 70%; background: var(--score); color: white; border: none; padding: 15px; border-radius: 30px; font-weight: bold; z-index: 110; }
    </style>
</head>
<body data-theme="light">

    <div id="header">
        <div id="score-val">0</div>
        <div id="mps-val" style="font-size: 0.8rem; color: var(--sub);">GEN: 0/s</div>
    </div>

    <div id="user-info">
        <div id="user-name" onclick="changeName()" style="font-weight:bold; color:var(--accent);">Loading... ✎</div>
        <div id="my-rank">Rank: --</div>
    </div>

    <button id="rank-toggle" class="top-btn" onclick="toggleModal('rank-modal')">🏆</button>
    <button id="theme-toggle" class="top-btn" onclick="toggleTheme()">🌙</button>

    <div id="main-game"><button id="core-btn">TAP!!</button></div>

    <div id="rank-modal" class="modal">
        <h2 style="text-align:center">Global Ranking</h2>
        <div id="rank-list">読み込み中...</div>
    </div>

    <div id="shop-modal" class="modal">
        <h2 style="text-align:center">Shop</h2>
        <div id="shop-list"></div>
    </div>

    <button id="shop-toggle" onclick="toggleModal('shop-modal')">UPGRADE SHOP</button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAYnC_bHIPYElG8zjbL-7vEIH4rWSA7hbw",
        authDomain: "my-warfare-game-fa3db.firebaseapp.com",
        databaseURL: "https://my-warfare-game-fa3db-default-rtdb.firebaseio.com",
        projectId: "my-warfare-game-fa3db",
        storageBucket: "my-warfare-game-fa3db.firebasestorage.app",
        messagingSenderId: "408551026184",
        appId: "1:408551026184:web:85e80b61c8110ce3d6abbd"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myId = localStorage.getItem('warfare_v8_id') || "U-" + Math.random().toString(36).substring(2, 7).toUpperCase();
    localStorage.setItem('warfare_v8_id', myId);
    let displayName = localStorage.getItem('warfare_name') || myId;

    const shopItems = [
        { name: "Nano Bot", base: 15, p: 0.2 },
        { name: "Logic Core", base: 100, p: 1.0 },
        { name: "Siphon", base: 500, p: 6.5 },
        { name: "Cyber Rig", base: 3000, p: 30.0 },
        { name: "Mainframe", base: 15000, p: 150.0 },
        { name: "Quantum", base: 200000, p: 1200.0 }
    ];

    let score = 0, counts = Array(shopItems.length).fill(0), mps = 0;

    db.ref('users/' + myId).on('value', (snap) => {
        const d = snap.val();
        if (d) { 
            if(d.score > score || !score) score = d.score || 0;
            if(d.counts) counts = d.counts;
            displayName = d.name || displayName;
        }
        document.getElementById('user-name').innerText = displayName + " ✎";
        updateMPS();
    });

    function toggleTheme() {
        const b = document.body;
        const next = b.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        b.setAttribute('data-theme', next);
        document.getElementById('theme-toggle').innerText = next === 'light' ? '🌙' : '☀️';
    }

    function changeName() {
        const n = prompt("名前を入力", displayName);
        if (n) { displayName = n; localStorage.setItem('warfare_name', n); save(); }
    }

    function updateMPS() {
        mps = counts.reduce((acc, c, i) => acc + (c * shopItems[i].p), 0);
        document.getElementById('mps-val').innerText = `GEN: ${mps.toFixed(1)} /s`;
    }

    function save() {
        db.ref('users/' + myId).update({ score: Math.floor(score), counts: counts, mps: Number(mps.toFixed(1)), name: displayName });
    }

    const tap = () => { score += 1 + (mps * 0.05); updateUI(); };
    document.getElementById('core-btn').onclick = tap;

    function toggleModal(id) {
        const t = document.getElementById(id);
        const active = t.classList.contains('active');
        document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        if (!active) t.classList.add('active');
        if (id === 'shop-modal') renderShop();
    }

    function buy(i) {
        const cost = Math.floor(shopItems[i].base * Math.pow(1.15, counts[i]));
        if (score >= cost) { score -= cost; counts[i]++; updateMPS(); renderShop(); save(); }
    }

    function attack(tid) {
        const cost = Math.floor(score * 0.1);
        if (cost < 50) return alert("Energy Low!");
        score -= cost;
        db.ref('users/' + tid + '/score').transaction(s => Math.max(0, (s || 0) - (cost * 4)));
        save();
    }

    function renderShop() {
        const container = document.getElementById('shop-list');
        container.innerHTML = shopItems.map((item, i) => {
            const cost = Math.floor(item.base * Math.pow(1.15, counts[i]));
            return `<div class="card ${score >= cost ? '' : 'disabled'}" onclick="buy(${i})">
                <div style="text-align:left">
                    <b>${item.name} (Lv.${counts[i]})</b><br>
                    <small>+${item.p}/s | Cost: ${cost.toLocaleString()}</small>
                </div>
            </div>`;
        }).join('');
    }

    function updateUI() { document.getElementById('score-val').innerText = Math.floor(score).toLocaleString(); }

    setInterval(() => { score += (mps / 10); updateUI(); }, 100);
    setInterval(save, 5000);

    // ランキング取得（エラーハンドリング追加）
    db.ref('users').orderByChild('score').on('value', (snap) => {
        let players = [];
        snap.forEach(c => { players.unshift({ id: c.key, ...c.val() }); });
        
        const list = document.getElementById('rank-list');
        list.innerHTML = "";
        
        const myRankIdx = players.findIndex(p => p.id === myId);
        document.getElementById('my-rank').innerText = "Rank: " + (myRankIdx + 1 || "--");

        let displayPlayers = players.slice(0, 10);
        if (myRankIdx >= 10) displayPlayers.push(players[myRankIdx]);

        displayPlayers.forEach((p, idx) => {
            const realRank = players.findIndex(orig => orig.id === p.id) + 1;
            const div = document.createElement('div');
            div.className = `card ${p.id === myId ? 'is-me' : ''}`;
            div.innerHTML = `<div><b>#${realRank} ${p.name || p.id}</b><br><small>Score: ${Math.floor(p.score || 0).toLocaleString()}</small></div>
            ${p.id !== myId ? `<button class="attack-btn" onclick="attack('${p.id}')">ATK</button>` : '<span>(YOU)</span>'}`;
            list.appendChild(div);
        });
    }, (error) => {
        console.error(error);
        document.getElementById('rank-list').innerText = "ランキング読み込みエラー。ルール設定を確認してください。";
    });
</script>
</body>
</html>
