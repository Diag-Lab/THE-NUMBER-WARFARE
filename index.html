<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE NUMBER: WARFARE</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #f8faff; --card: #ffffff; --text: #2c2c2e; --sub: #8e8e93; --accent: #007aff; --attack: #ff3b30; --score: #5856d6; --border: #e0e0e0; }
        [data-theme='dark'] { --bg: #0a0a0a; --card: #1c1c1e; --text: #ffffff; --sub: #aaa; --accent: #0a84ff; --attack: #ff453a; --score: #bf5af2; --border: #333; }
        
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; transition: 0.3s; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* 青い枠を消す & タップを快適に */
        * { -webkit-tap-highlight-color: transparent; outline: none !important; user-select: none; }

        #game-container { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; z-index: 5; }
        #header { position: absolute; top: 0; width: 100%; height: 80px; background: var(--card); border-bottom: 1px solid var(--border); z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #score-val { font-size: 2.2rem; color: var(--score); font-weight: 800; }
        
        #core-btn { width: 150px; height: 150px; border-radius: 50%; background: var(--card); border: 6px solid var(--accent); color: var(--accent); font-size: 1.4rem; font-weight: 900; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.1); transition: 0.1s; }
        #core-btn:active { transform: scale(0.92); }

        /* タップエフェクト (+1) */
        .tap-effect { position: absolute; color: var(--accent); font-weight: bold; pointer-events: none; animation: fadeUp 0.6s ease-out forwards; z-index: 100; font-size: 1.2rem; }
        @keyframes fadeUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-50px); } }

        /* チャットエリア（全画面対応） */
        #bbs-container { height: 60px; background: var(--card); border-top: 2px solid var(--border); display: flex; flex-direction: column; z-index: 100; transition: 0.4s ease; position: relative; }
        #bbs-container.expanded { height: 100vh; position: fixed; top: 0; left: 0; right: 0; bottom: 0; }
        #bbs-header { padding: 15px; font-size: 0.9rem; font-weight: bold; background: var(--bg); border-bottom: 1px solid var(--border); cursor: pointer; display: flex; justify-content: space-between; }
        #bbs-messages { flex: 1; overflow-y: auto; padding: 15px; display: none; }
        #bbs-container.expanded #bbs-messages { display: block; }
        #bbs-input-area { padding: 10px; display: none; gap: 8px; border-top: 1px solid var(--border); background: var(--card); }
        #bbs-container.expanded #bbs-input-area { display: flex; }
        #bbs-input { flex: 1; padding: 12px; border-radius: 25px; border: 1px solid var(--border); font-size: 16px; background: var(--bg); color: var(--text); }
        #bbs-send { background: var(--accent); color: white; border: none; padding: 0 20px; border-radius: 25px; font-weight: bold; }

        /* モーダル */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; display: none; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: var(--bg); width: 90%; max-width: 450px; height: 70vh; border-radius: 25px; padding: 20px; overflow-y: auto; position: relative; }
        .close-btn { position: sticky; top: 0; float: right; background: #888; color: white; border: none; border-radius: 50%; width: 35px; height: 35px; cursor: pointer; }
        
        .card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }
        .item-price { font-weight: bold; color: var(--accent); }
        .top-btn { position: absolute; top: 15px; z-index: 20; border: none; padding: 10px 15px; border-radius: 20px; color: white; font-weight: bold; }
        #rank-toggle { right: 75px; background: var(--accent); }
        #theme-toggle { right: 10px; background: #555; }
        #shop-toggle { position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%); width: 70%; background: var(--score); color: white; border: none; padding: 12px; border-radius: 30px; font-weight: bold; z-index: 15; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body data-theme="light">

    <div id="game-container">
        <div id="header">
            <div id="score-val">0</div>
            <div id="mps-val" style="font-size: 0.8rem; color: var(--sub);">0/s (Click: 1)</div>
        </div>
        <button id="rank-toggle" class="top-btn" onclick="toggleModal('rank-modal')">🏆</button>
        <button id="theme-toggle" class="top-btn" onclick="toggleTheme()">🌙</button>
        <button id="core-btn">TAP!!</button>
        <button id="shop-toggle" onclick="toggleModal('shop-modal')">UPGRADE SHOP</button>
    </div>

    <div id="bbs-container">
        <div id="bbs-header" onclick="toggleChat()">
            <span>💬 LIVE CHAT (Tap to open)</span>
            <span id="chat-close-icon" style="display:none;">▼ Close</span>
        </div>
        <div id="bbs-messages"></div>
        <div id="bbs-input-area">
            <input type="text" id="bbs-input" placeholder="Say something..." maxlength="50">
            <button id="bbs-send" onclick="sendMsg()">Send</button>
        </div>
    </div>

    <div id="rank-modal" class="modal" onclick="this.classList.remove('active')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="document.getElementById('rank-modal').classList.remove('active')">×</button>
            <h3 style="text-align:center">World Ranking</h3>
            <div id="rank-list"></div>
        </div>
    </div>

    <div id="shop-modal" class="modal" onclick="this.classList.remove('active')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <button class="close-btn" onclick="document.getElementById('shop-modal').classList.remove('active')">×</button>
            <h3 style="text-align:center">Shop</h3>
            <div id="shop-list"></div>
        </div>
    </div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAYnC_bHIPYElG8zjbL-7vEIH4rWSA7hbw", authDomain: "my-warfare-game-fa3db.firebaseapp.com", databaseURL: "https://my-warfare-game-fa3db-default-rtdb.firebaseio.com", projectId: "my-warfare-game-fa3db", storageBucket: "my-warfare-game-fa3db.firebasestorage.app", messagingSenderId: "408551026184", appId: "1:408551026184:web:85e80b61c8110ce3d6abbd" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const badWords = ["死ね", "殺す", "バカ", "あほ", "ゴミ", "カス", "fuck", "shit", "die"];
    let myId = localStorage.getItem('warfare_v14_id') || "U-" + Math.random().toString(36).substring(2, 7).toUpperCase();
    localStorage.setItem('warfare_v14_id', myId);
    let displayName = localStorage.getItem('warfare_name') || myId;
    let score = 0, clickPower = 1, lastAttackTime = 0, COOLDOWN_MS = 25000;

    // 施設リスト（クリック強化10個 + 自動生成16個）
    const clickUpgrades = Array.from({length: 10}, (_, i) => ({
        name: `Click Booster Tier ${i+1}`,
        base: Math.pow(10, i + 1.5),
        power: Math.pow(2, i + 1),
        isClick: true
    }));

    const autoUpgrades = [
        { name: "Nano Bot", base: 15, p: 0.2 }, { name: "Logic Core", base: 100, p: 1.0 }, { name: "Siphon", base: 500, p: 8.0 }, { name: "Cyber Rig", base: 3000, p: 40.0 }, { name: "Mainframe", base: 15000, p: 200.0 }, { name: "Mega AI", base: 100000, p: 1500.0 }, { name: "Quantum Net", base: 800000, p: 9000.0 }, { name: "Neural Cloud", base: 5000000, p: 60000.0 }, { name: "Data Citadel", base: 30000000, p: 400000.0 }, { name: "Orbital Relay", base: 200000000, p: 2500000.0 }, { name: "Galaxy Server", base: 1500000000, p: 18000000.0 }, { name: "Time Sphere", base: 10000000000, p: 120000000.0 }, { name: "Void Gate", base: 75000000000, p: 900000000.0 }, { name: "Star Core", base: 500000000000, p: 7000000000.0 }, { name: "Reality Engine", base: 4000000000000, p: 55000000000.0 }, { name: "Cosmic Singularity", base: 30000000000000, p: 450000000000.0 }
    ];

    const shopItems = [...clickUpgrades, ...autoUpgrades];
    let counts = Array(shopItems.length).fill(0);

    db.ref('users/' + myId).on('value', (snap) => {
        const d = snap.val();
        if (d) { 
            score = d.score || 0;
            if(d.counts) counts = shopItems.map((_, i) => d.counts[i] || 0);
            displayName = d.name || displayName;
        }
        updateAll();
    });

    function updateAll() {
        let mps = 0; clickPower = 1;
        shopItems.forEach((item, i) => {
            if (item.isClick) clickPower += (counts[i] * item.power);
            else mps += (counts[i] * item.p);
        });
        document.getElementById('score-val').innerText = Math.floor(score).toLocaleString();
        document.getElementById('mps-val').innerText = `${mps.toFixed(1)}/s (Click: ${clickPower.toLocaleString()})`;
    }

    // タップ演出
    document.getElementById('core-btn').addEventListener('click', (e) => {
        score += clickPower;
        updateAll();
        const effect = document.createElement('div');
        effect.className = 'tap-effect';
        effect.innerText = `+${clickPower.toLocaleString()}`;
        effect.style.left = `${e.pageX - 20}px`;
        effect.style.top = `${e.pageY - 20}px`;
        document.body.appendChild(effect);
        setTimeout(() => effect.remove(), 600);
    });

    // チャット開閉
    function toggleChat() {
        const bbs = document.getElementById('bbs-container');
        bbs.classList.toggle('expanded');
        document.getElementById('chat-close-icon').style.display = bbs.classList.contains('expanded') ? 'inline' : 'none';
        if(bbs.classList.contains('expanded')) {
            const container = document.getElementById('bbs-messages');
            container.scrollTop = container.scrollHeight;
        }
    }

    function sendMsg() {
        const input = document.getElementById('bbs-input');
        if (!input.value.trim()) return;
        if (badWords.some(w => input.value.includes(w))) return alert("Inappropriate language.");
        db.ref('messages').push({ name: displayName, text: input.value.trim(), time: Date.now() });
        input.value = "";
    }

    db.ref('messages').limitToLast(30).on('value', (snap) => {
        const container = document.getElementById('bbs-messages');
        container.innerHTML = "";
        snap.forEach(c => {
            const m = c.val();
            container.innerHTML += `<div style="margin-bottom:10px;"><b>${m.name}:</b> ${m.text}</div>`;
        });
        container.scrollTop = container.scrollHeight;
    });

    function save() { db.ref('users/' + myId).update({ score: Math.floor(score), counts: counts, name: displayName }); }
    function buy(i) {
        const cost = Math.floor(shopItems[i].base * Math.pow(1.2, counts[i]));
        if (score >= cost) { score -= cost; counts[i]++; renderShop(); updateAll(); save(); }
    }

    function renderShop() {
        const container = document.getElementById('shop-list');
        container.innerHTML = shopItems.map((item, i) => {
            const cost = Math.floor(item.base * Math.pow(1.2, counts[i]));
            return `<div class="card ${score >= cost ? 'can-buy' : 'disabled'}" onclick="buy(${i})">
                <div><b>${item.name}</b><br><small>${item.isClick ? 'Click +' + item.power : '+' + item.p + '/s'}</small></div>
                <div class="item-price">${cost.toLocaleString()}</div>
            </div>`;
        }).join('');
    }

    function toggleModal(id) { document.getElementById(id).classList.add('active'); if(id === 'shop-modal') renderShop(); }
    function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light'); }
    function changeName() { const n = prompt("New name?", displayName); if(n) { displayName = n; save(); } }

    setInterval(() => { 
        let mps = 0;
        shopItems.forEach((item, i) => { if(!item.isClick) mps += (counts[i] * item.p); });
        score += (mps / 10); updateAll(); 
    }, 100);
    setInterval(save, 5000);

    // Enter送信対応
    document.getElementById('bbs-input').onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };
</script>
</body>
</html>
