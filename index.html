<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE NUMBER: WARFARE -TACTICAL-</title>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { --pink: #ff007c; --blue: #00e5ff; --yellow: #fff000; --bg: #050505; }
        body { margin: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; touch-action: manipulation; user-select: none; }
        
        /* ヘッダー・スコア */
        #header { position: fixed; top: 0; width: 100%; height: 80px; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; align-items: center; justify-content: center; border-bottom: 2px solid var(--pink); z-index: 100; }
        #score-val { font-size: 2rem; color: var(--yellow); font-weight: bold; }
        #mps-val { font-size: 0.8rem; color: var(--blue); }

        /* 右上ランキングボタン */
        #rank-toggle { position: fixed; top: 15px; right: 15px; background: var(--blue); color: black; border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; z-index: 110; cursor: pointer; }

        /* メインエリア（タップボタン） */
        #main-game { height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #core-btn { width: 200px; height: 200px; border-radius: 50%; background: #111; border: 8px solid var(--pink); color: var(--pink); font-size: 1.5rem; font-weight: bold; box-shadow: 0 0 20px var(--pink); cursor: pointer; transition: 0.05s; outline: none; }
        #core-btn:active { transform: scale(0.92); filter: brightness(1.3); }

        /* モーダル共通スタイル（Ranking/Shop用） */
        .modal { position: fixed; top: 80px; bottom: 80px; left: 0; right: 0; background: var(--bg); z-index: 90; display: none; overflow-y: auto; padding: 20px; }
        .modal.active { display: block; }
        .modal-title { color: var(--blue); border-bottom: 1px solid; margin-bottom: 15px; font-weight: bold; }

        /* ランキング表示 */
        .rank-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #222; background: #111; margin-bottom: 5px; border-radius: 8px; }
        .rank-item.is-me { border: 1px solid var(--yellow); color: var(--yellow); }
        .attack-btn { background: var(--pink); color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; font-size: 0.8rem; }

        /* ショップ表示 */
        .shop-item { background: #1a1a1a; border: 2px solid #333; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; cursor: pointer; width: 100%; box-sizing: border-box; }
        .shop-item.can-buy { border-color: var(--blue); background: #222; }
        .shop-item:active { transform: scale(0.98); }
        .item-name { font-size: 1.1rem; font-weight: bold; color: var(--blue); display: block; }
        .item-cost { color: var(--yellow); font-size: 0.9rem; }
        .item-count { font-size: 1.5rem; font-weight: bold; opacity: 0.5; }

        /* 下部ショップボタン */
        #shop-toggle { position: fixed; bottom: 0; width: 100%; height: 60px; background: var(--pink); color: white; border: none; font-size: 1.2rem; font-weight: bold; z-index: 110; cursor: pointer; }
    </style>
</head>
<body>

    <div id="header">
        <div id="score-val">0</div>
        <div id="mps-val">GEN: 0 /s</div>
    </div>

    <button id="rank-toggle" onclick="toggleModal('rank-modal')">RANKING</button>

    <div id="main-game">
        <button id="core-btn">CHARGE</button>
    </div>

    <div id="rank-modal" class="modal">
        <div class="modal-title">GLOBAL TARGETS</div>
        <div id="rank-list">Loading...</div>
    </div>

    <div id="shop-modal" class="modal">
        <div class="modal-title">UPGRADE SHOP</div>
        <div id="shop-list"></div>
    </div>

    <button id="shop-toggle" onclick="toggleModal('shop-modal')">SHOP</button>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAYnC_bHIPYElG8zjbL-7vEIH4rWSA7hbw",
        authDomain: "my-warfare-game-fa3db.firebaseapp.com",
        databaseURL: "https://my-warfare-game-fa3db-default-rtdb.firebaseio.com",
        projectId: "my-warfare-game-fa3db",
        storageBucket: "my-warfare-game-fa3db.firebasestorage.app",
        messagingSenderId: "408551026184",
        appId: "1:408551026184:web:85e80b61c8110ce3d6abbd"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // ID固定
    let myId = localStorage.getItem('warfare_v4_id') || "U-" + Math.random().toString(36).substring(2, 7).toUpperCase();
    localStorage.setItem('warfare_v4_id', myId);

    // 施設
    const shopItems = [
        { name: "Nano Link", base: 15, p: 0.2 },
        { name: "Logic Core", base: 100, p: 1 },
        { name: "Siphon Driller", base: 500, p: 6 },
        { name: "Cyber Rig", base: 3000, p: 25 },
        { name: "Neural Node", base: 15000, p: 120 },
        { name: "Titan Server", base: 80000, p: 600 },
        { name: "Quantum Gate", base: 400000, p: 3200 },
        { name: "AI Overlord", base: 2000000, p: 15000 }
    ];

    let score = 0;
    let counts = Array(shopItems.length).fill(0);
    let mps = 0;

    // 初期読み込み
    db.ref('users/' + myId).once('value', (snap) => {
        const d = snap.val();
        if (d) { score = d.score || 0; if(d.counts) counts = d.counts; }
        updateMPS();
        renderShop();
    });

    function updateMPS() {
        mps = counts.reduce((acc, c, i) => acc + (c * shopItems[i].p), 0);
        document.getElementById('mps-val').innerText = `GEN: ${mps.toFixed(1)} /s`;
    }

    function save() {
        db.ref('users/' + myId).set({ score: Math.floor(score), counts: counts, mps: Number(mps.toFixed(1)) });
    }

    // タップ
    const handleTap = (e) => {
        if(e) e.preventDefault();
        score += 1 + (mps * 0.05);
        updateUI();
    };
    document.getElementById('core-btn').addEventListener('touchstart', handleTap);
    document.getElementById('core-btn').addEventListener('mousedown', handleTap);

    // モーダル切り替え
    function toggleModal(id) {
        const target = document.getElementById(id);
        const isActive = target.classList.contains('active');
        document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        if (!isActive) target.classList.add('active');
    }

    function buy(i) {
        const cost = Math.floor(shopItems[i].base * Math.pow(1.15, counts[i]));
        if (score >= cost) {
            score -= cost;
            counts[i]++;
            updateMPS();
            renderShop();
            updateUI();
            save();
        }
    }

    function attack(targetId) {
        if (score < 100) return alert("Energy too low!");
        const cost = Math.floor(score * 0.1);
        score -= cost;
        db.ref('users/' + targetId + '/score').transaction(s => Math.max(0, (s || 0) - (cost * 4)));
        save();
        alert(`ATTACKED ${targetId}!`);
    }

    function renderShop() {
        const container = document.getElementById('shop-list');
        container.innerHTML = shopItems.map((item, i) => {
            const cost = Math.floor(item.base * Math.pow(1.15, counts[i]));
            return `
                <div class="shop-item ${score >= cost ? 'can-buy' : ''}" onclick="buy(${i})">
                    <div style="text-align:left">
                        <span class="item-name">${item.name}</span>
                        <span class="item-cost">Cost: ${cost.toLocaleString()}</span>
                    </div>
                    <div class="item-count">${counts[i]}</div>
                </div>
            `;
        }).join('');
    }

    function updateUI() {
        document.getElementById('score-val').innerText = Math.floor(score).toLocaleString();
    }

    setInterval(() => {
        score += (mps / 10);
        updateUI();
        if(document.getElementById('shop-modal').classList.contains('active')) renderShop();
    }, 100);

    setInterval(save, 10000);

    db.ref('users').orderByChild('score').limitToLast(10).on('value', (snap) => {
        const list = document.getElementById('rank-list');
        list.innerHTML = "";
        let players = [];
        snap.forEach(c => players.unshift({ id: c.key, ...c.val() }));
        players.forEach((p, idx) => {
            if (p.id === myId) score = p.score;
            const div = document.createElement('div');
            div.className = `rank-item ${p.id === myId ? 'is-me' : ''}`;
            div.innerHTML = `
                <span>#${idx+1} ${p.id.substring(0,8)}: ${Math.floor(p.score).toLocaleString()}</span>
                ${p.id !== myId ? `<button class="attack-btn" onclick="attack('${p.id}')">ATTACK</button>` : ' (YOU)'}
            `;
            list.appendChild(div);
        });
    });
</script>
</body>
</html>
