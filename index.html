<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE NUMBER: WARFARE</title>
    
    <meta name="description" content="リアルタイムでランキングが変動する放置型クリック戦争。施設を強化して稼ぎ、500スコア貯めてライバルを攻撃せよ！掲示板で交流しながら1位を目指すオンライン対戦ゲーム。">
    
    <link rel="icon" href="1778230381094.png" type="image/png">
    
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <style>
        :root { 
            --bg: #f8faff; --card: #ffffff; --text: #2c2c2e; --sub: #8e8e93; 
            --accent: #007aff; --attack: #ff3b30; --score: #5856d6; --border: #e0e0e0;
        }
        [data-theme='dark'] {
            --bg: #0a0a0a; --card: #1c1c1e; --text: #ffffff; --sub: #aaa; 
            --accent: #0a84ff; --attack: #ff453a; --score: #bf5af2; --border: #333;
        }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: sans-serif; transition: 0.3s; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #game-container { flex: 1; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        #header { position: absolute; top: 0; width: 100%; height: 90px; background: var(--card); border-bottom: 1px solid var(--border); z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0.95; }
        #score-val { font-size: 2rem; color: var(--score); font-weight: 800; }
        
        .top-btn { position: absolute; top: 15px; z-index: 20; border: none; padding: 8px 12px; border-radius: 15px; cursor: pointer; color: white; font-weight: bold; }
        #rank-toggle { right: 70px; background: var(--accent); }
        #theme-toggle { right: 10px; background: #555; }
        #user-info { position: absolute; top: 10px; left: 10px; z-index: 20; background: var(--card); padding: 6px 10px; border-radius: 10px; border: 1px solid var(--border); font-size: 0.7rem; }

        #core-btn { width: 160px; height: 160px; border-radius: 50%; background: var(--card); border: 6px solid var(--accent); color: var(--accent); font-size: 1.4rem; font-weight: 900; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.1); outline: none; }
        #core-btn:active { transform: scale(0.95); }

        #bbs-container { height: 30vh; background: var(--card); border-top: 1px solid var(--border); display: flex; flex-direction: column; z-index: 30; }
        #bbs-header { padding: 8px; font-size: 0.8rem; font-weight: bold; border-bottom: 1px solid var(--border); background: var(--bg); display: flex; justify-content: space-between; }
        #bbs-messages { flex: 1; overflow-y: auto; padding: 10px; font-size: 0.9rem; }
        .msg { margin-bottom: 8px; border-bottom: 1px solid var(--border); padding-bottom: 4px; }
        .msg-name { font-weight: bold; color: var(--accent); font-size: 0.75rem; }

        #bbs-input-area { padding: 10px; display: flex; gap: 5px; border-top: 1px solid var(--border); }
        #bbs-input { flex: 1; padding: 8px; border-radius: 20px; border: 1px solid var(--border); outline: none; background: var(--bg); color: var(--text); }
        #bbs-send { background: var(--accent); color: white; border: none; padding: 8px 15px; border-radius: 20px; font-weight: bold; }

        .modal { position: fixed; top: 90px; bottom: 30vh; left: 0; right: 0; background: var(--bg); z-index: 100; display: none; overflow-y: auto; padding: 20px; }
        .modal.active { display: block; }

        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 2px solid var(--border); transition: 0.2s; }
        .card.can-buy { border-color: var(--accent); cursor: pointer; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.1); }
        .card.disabled { opacity: 0.4; filter: grayscale(0.8); cursor: not-allowed; }
        .item-price { font-weight: bold; color: var(--accent); }

        .attack-btn { background: var(--attack); color: white; border: none; padding: 6px 10px; border-radius: 8px; font-weight: bold; font-size: 0.8rem; }
        #shop-toggle { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); width: 60%; background: var(--score); color: white; border: none; padding: 12px; border-radius: 25px; font-weight: bold; z-index: 15; cursor: pointer; }
    </style>
</head>
<body data-theme="light">

    <div id="game-container">
        <div id="header">
            <div id="score-val">0</div>
            <div id="mps-val" style="font-size: 0.8rem; color: var(--sub);">GEN: 0/s</div>
        </div>

        <div id="user-info">
            <span id="user-name" onclick="changeName()" style="font-weight:bold; color:var(--accent); cursor:pointer;">Loading... ✎</span>
            <div id="my-rank">Rank: --</div>
        </div>

        <button id="rank-toggle" class="top-btn" onclick="toggleModal('rank-modal')">🏆</button>
        <button id="theme-toggle" class="top-btn" onclick="toggleTheme()">🌙</button>

        <button id="core-btn">TAP!!</button>
        <button id="shop-toggle" onclick="toggleModal('shop-modal')">UPGRADE SHOP</button>
    </div>

    <div id="bbs-container">
        <div id="bbs-header"><span>LIVE CHAT</span><span style="font-size:0.7rem; color:var(--sub);">自由掲示板</span></div>
        <div id="bbs-messages"></div>
        <div id="bbs-input-area">
            <input type="text" id="bbs-input" placeholder="メッセージ..." maxlength="50">
            <button id="bbs-send" onclick="sendMsg()">送信</button>
        </div>
    </div>

    <div id="rank-modal" class="modal">
        <h2 style="text-align:center">Top 10 Rankings</h2>
        <div id="rank-list"></div>
    </div>

    <div id="shop-modal" class="modal">
        <h2 style="text-align:center">Shop</h2>
        <div id="shop-list"></div>
    </div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAYnC_bHIPYElG8zjbL-7vEIH4rWSA7hbw",
        authDomain: "my-warfare-game-fa3db.firebaseapp.com",
        databaseURL: "https://my-warfare-game-fa3db-default-rtdb.firebaseio.com",
        projectId: "my-warfare-game-fa3db",
        storageBucket: "my-warfare-game-fa3db.firebasestorage.app",
        messagingSenderId: "408551026184",
        appId: "1:408551026184:web:85e80b61c8110ce3d6abbd"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let myId = localStorage.getItem('warfare_v14_id') || "U-" + Math.random().toString(36).substring(2, 7).toUpperCase();
    localStorage.setItem('warfare_v14_id', myId);
    let displayName = localStorage.getItem('warfare_name') || myId;

    const shopItems = [
        { name: "Nano Bot", base: 15, p: 0.2 },
        { name: "Logic Core", base: 100, p: 1.0 },
        { name: "Siphon", base: 500, p: 8.0 },
        { name: "Cyber Rig", base: 3000, p: 40.0 },
        { name: "Mainframe", base: 15000, p: 200.0 },
        { name: "Mega AI", base: 100000, p: 1500.0 }
    ];

    let score = 0, counts = Array(shopItems.length).fill(0), mps = 0;

    db.ref('users/' + myId).on('value', (snap) => {
        const d = snap.val();
        if (d) { 
            if(d.score > score || score === 0) score = d.score || 0;
            if(d.counts) counts = d.counts;
            displayName = d.name || displayName;
        }
        document.getElementById('user-name').innerText = displayName + " ✎";
        updateMPS();
    });

    function save() {
        db.ref('users/' + myId).update({ score: Math.floor(score), counts: counts, mps: Number(mps.toFixed(1)), name: displayName });
    }

    function sendMsg() {
        const input = document.getElementById('bbs-input');
        if (!input.value.trim()) return;
        db.ref('messages').push({ name: displayName, text: input.value.trim(), time: Date.now() });
        input.value = "";
    }

    db.ref('messages').limitToLast(20).on('value', (snap) => {
        const container = document.getElementById('bbs-messages');
        container.innerHTML = "";
        snap.forEach(c => {
            const m = c.val();
            container.innerHTML += `<div class="msg"><span class="msg-name">${m.name}:</span><span class="msg-text">${m.text}</span></div>`;
        });
        container.scrollTop = container.scrollHeight;
    });

    function toggleTheme() {
        const b = document.body;
        const next = b.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        b.setAttribute('data-theme', next);
        document.getElementById('theme-toggle').innerText = next === 'light' ? '🌙' : '☀️';
    }

    function changeName() {
        const n = prompt("名前を入力", displayName);
        if (n) { displayName = n; localStorage.setItem('warfare_name', n); save(); }
    }

    function updateMPS() {
        mps = counts.reduce((acc, c, i) => acc + (c * shopItems[i].p), 0);
        document.getElementById('mps-val').innerText = `GEN: ${mps.toFixed(1)}/s`;
    }

    document.getElementById('core-btn').onclick = () => { score += 1 + (mps * 0.05); updateUI(); };

    function toggleModal(id) {
        const t = document.getElementById(id);
        const active = t.classList.contains('active');
        document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        if (!active) t.classList.add('active');
        if (id === 'shop-modal') renderShop();
    }

    function buy(i) {
        const cost = Math.floor(shopItems[i].base * Math.pow(1.15, counts[i]));
        if (score >= cost) { score -= cost; counts[i]++; updateMPS(); renderShop(); save(); }
    }

    function renderShop() {
        const container = document.getElementById('shop-list');
        container.innerHTML = shopItems.map((item, i) => {
            const cost = Math.floor(item.base * Math.pow(1.15, counts[i]));
            const canBuy = score >= cost;
            return `<div class="card ${canBuy ? 'can-buy' : 'disabled'}" onclick="buy(${i})">
                <div style="text-align:left">
                    <b>${item.name} (Lv.${counts[i]})</b><br><small>+${item.p}/s</small>
                </div>
                <div class="item-price">${cost.toLocaleString()}</div>
            </div>`;
        }).join('');
    }

    function updateUI() { 
        document.getElementById('score-val').innerText = Math.floor(score).toLocaleString();
        if (document.getElementById('shop-modal').classList.contains('active')) {
            const cards = document.querySelectorAll('#shop-list .card');
            shopItems.forEach((item, i) => {
                const cost = Math.floor(item.base * Math.pow(1.15, counts[i]));
                if (score >= cost) { cards[i].classList.add('can-buy'); cards[i].classList.remove('disabled'); }
                else { cards[i].classList.remove('can-buy'); cards[i].classList.add('disabled'); }
            });
        }
    }

    setInterval(() => { score += (mps / 10); updateUI(); }, 100);
    setInterval(save, 5000);

    db.ref('users').orderByChild('score').limitToLast(10).on('value', (snap) => {
        let players = [];
        snap.forEach(c => { players.unshift({ id: c.key, ...c.val() }); });
        const list = document.getElementById('rank-list');
        list.innerHTML = "";
        
        const myRankIdx = players.findIndex(p => p.id === myId);
        document.getElementById('my-rank').innerText = "Rank: " + (myRankIdx !== -1 ? myRankIdx + 1 : "10+");

        players.forEach((p, idx) => {
            const div = document.createElement('div');
            div.className = `card ${p.id === myId ? 'is-me' : ''}`;
            div.innerHTML = `<div><b>#${idx+1} ${p.name || p.id}</b><br><small>${Math.floor(p.score || 0).toLocaleString()}</small></div>
            ${p.id !== myId ? `<button class="attack-btn" onclick="attack('${p.id}')">ATK</button>` : '<span>(YOU)</span>'}`;
            list.appendChild(div);
        });
    });

    function attack(tid) {
        if (score < 500) return alert("500スコア必要です！");
        const cost = Math.floor(score * 0.1);
        score -= cost;
        db.ref('users/' + tid + '/score').transaction(s => Math.max(0, (s || 0) - (cost * 10)));
        save();
        alert("CRITICAL HIT!");
    }

    document.getElementById('bbs-input').onkeypress = (e) => { if (e.key === 'Enter') sendMsg(); };
</script>
</body>
</html>
